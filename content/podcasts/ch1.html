<h2 id="listen">Listen</h2><p>Each player lets you play and pause, skip 10 seconds back or forward, drag the bar to jump anywhere, and change the playback speed.</p>
<div class="player" data-src="assets/audio/ch1-short.m4a">
  <div class="player__head">
    <span class="player__badge">Short</span>
    <div class="player__titles">
      <p class="player__title">Chapter 1 — Quick Summary</p>
      <p class="player__sub">Condensed overview · about 6 min</p>
    </div>
  </div>
  <audio preload="metadata" src="assets/audio/ch1-short.m4a"></audio>
  <div class="player__bar">
    <span class="player__time js-cur">0:00</span>
    <div class="player__scrub js-scrub" role="slider" tabindex="0" aria-label="Seek audio position" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
      <div class="player__track"><div class="player__buffered js-buffered"></div><div class="player__played js-played"></div></div>
      <div class="player__handle js-handle"></div>
    </div>
    <span class="player__time js-dur">0:00</span>
  </div>
  <div class="player__controls">
    <button type="button" class="player__btn js-back" aria-label="Back 10 seconds">&#8634;<span class="seek-num">10</span></button>
    <button type="button" class="player__btn player__btn--main js-play" aria-label="Play">&#9654;</button>
    <button type="button" class="player__btn js-fwd" aria-label="Forward 10 seconds"><span class="seek-num">10</span>&#8635;</button>
    <button type="button" class="player__btn js-stop" aria-label="Stop">&#9632;</button>
    <button type="button" class="player__btn player__btn--rate js-rate" aria-label="Change playback speed">1×</button>
  </div>
</div>
<div class="player" data-src="assets/audio/ch1-long.m4a">

  <div class="player__bar">

    <div class="player__scrub js-scrub" role="slider" tabindex="0" aria-label="Seek audio position" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
      <div class="player__track"><div class="player__buffered js-buffered"></div><div class="player__played js-played"></div></div>
      <div class="player__handle js-handle"></div>
    </div>
    <span class="player__time js-dur">0:00</span>
  </div>
  <div class="player__controls">
    <button type="button" class="player__btn js-back" aria-label="Back 10 seconds">&#8634;<span class="seek-num">10</span></button>
    <button type="button" class="player__btn player__btn--main js-play" aria-label="Play">&#9654;</button>
    <button type="button" class="player__btn js-fwd" aria-label="Forward 10 seconds"><span class="seek-num">10</span>&#8635;</button>

  </div>
</div>
